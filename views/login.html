<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - AI Art Studio</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">AI Art Studio</div>
            <ul class="nav-links">
                <li><a href="/">Главная</a></li>
                <li><a href="/chat">Чат</a></li>
                <li><a href="/gallery">Галерея</a></li>
                <li><a href="/login" class="active">Войти</a></li>
                <li><a href="/register">Регистрация</a></li>
                <li><a href="/admin" id="admin-link" style="display: none;">Админ</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="max-width: 400px; margin-top: 100px;">
        <div class="generator-section">
            <h2 style="text-align: center; margin-bottom: 2rem;">Вход в систему</h2>
            
            <div style="margin-bottom: 1rem; padding: 0.5rem; background: rgba(99, 102, 241, 0.1); border-radius: 5px; text-align: center;">
                <p style="color: var(--primary-color); font-size: 0.9rem;">⚡ air.fail + GigaChat</p>
            </div>
            
            <div id="error-message" style="color: #ef4444; margin-bottom: 1rem; text-align: center;"></div>
            
            <form id="loginForm">
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem;">Логин</label>
                    <input type="text" id="username" class="prompt-input" value="admin" required>
                </div>
                
                <div style="margin-bottom: 2rem;">
                    <label style="display: block; margin-bottom: 0.5rem;">Пароль</label>
                    <input type="password" id="password" class="prompt-input" value="admin123" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Войти
                </button>
            </form>
            
            <p style="text-align: center; margin-top: 1rem; color: #94a3b8;">
                Нет аккаунта? <a href="/register" style="color: var(--primary-color);">Зарегистрироваться</a>
            </p>
            
            <p style="text-align: center; margin-top: 0.5rem; color: #94a3b8; font-size: 0.8rem;">
                Тестовый аккаунт: admin / admin123
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.error || 'Ошибка входа';
                }
            } catch (error) {
                errorDiv.textContent = 'Ошибка соединения';
            }
        });
    </script>
</body>
</html>
